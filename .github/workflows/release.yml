name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.1)'
        required: false
        type: string

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: .
      
      - name: List files
        run: ls -la && ls -la app/build/outputs/apk/release/ 2>/dev/null || true
      
      - name: Get APK filename
        id: apk_info
        run: |
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            APK_FILE="app/build/outputs/apk/release/app-release.apk"
          else
            APK_FILE=$(find . -name "*.apk" -type f | head -1)
          fi
          echo "Found APK: $APK_FILE"
          echo "file=$APK_FILE" >> $GITHUB_OUTPUT
      
      - name: Generate checksum
        run: |
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            APK_FILE="app/build/outputs/apk/release/app-release.apk"
          else
            APK_FILE=$(find . -name "*.apk" -type f | head -1)
          fi
          echo "# FocusFlow Release" > checksums.txt
          echo "" >> checksums.txt
          echo "SHA256:" >> checksums.txt
          sha256sum "$APK_FILE" >> checksums.txt
          cat checksums.txt
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_name }}" != "" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: FocusFlow ${{ steps.version.outputs.version }}
          body: |
            ## FocusFlow ${{ steps.version.outputs.version }}
            
            A beautiful Pomodoro timer and task manager app for Android.
            
            ### Features
            - Pomodoro Timer with presets
            - Task Management with categories
            - Statistics & Weekly Reports
            - Daily Streak Tracking
            - Ambient Sounds
            
            ### Website
            https://chartmann1590.github.io/FocusFlow/
            
            ### Installation
            1. Download the APK below
            2. Enable 'Install from unknown sources'
            3. Open and install
          files: |
            app/build/outputs/apk/release/app-release.apk
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
