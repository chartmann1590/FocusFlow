name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.1)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      
      - name: Rename APK
        id: rename
        run: |
          cp app/build/outputs/apk/release/app-release.apk FocusFlow-${{ github.ref_name }}.apk
          ls -la *.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-apk
          path: FocusFlow-${{ github.ref_name }}.apk
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: focusflow-apk
          path: .
      
      - name: List files
        run: ls -la *.apk
      
      - name: Generate checksum
        id: checksum
        run: |
          echo "# FocusFlow Release" > checksums.txt
          echo "" >> checksums.txt
          echo "SHA256:" >> checksums.txt
          sha256sum *.apk >> checksums.txt
          cat checksums.txt
      
      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: FocusFlow ${{ steps.version.outputs.version }}
          body: |
            ## FocusFlow ${{ steps.version.outputs.version }}
            
            A beautiful Pomodoro timer and task manager app for Android.
            
            ### Website
            https://chartmann1590.github.io/FocusFlow/
            
            ### Installation
            1. Download the APK below
            2. Enable 'Install from unknown sources'
            3. Open and install
          files: |
            *.apk
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
