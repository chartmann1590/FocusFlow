name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      
      - name: Generate SHA256 hash
        id: hash
        run: |
          cd app/build/outputs/apk/release
          echo "hash=$(sha256sum *.apk | cut -d' ' -f1)" >> $GITHUB_OUTPUT
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: .
      
      - name: Get APK info
        id: apk_info
        run: |
          APK_FILE=$(ls *.apk | head -1)
          echo "file=$APK_FILE" >> $GITHUB_OUTPUT
          FILE_SIZE=$(stat -c%s "$APK_FILE")
          echo "size=$FILE_SIZE" >> $GITHUB_OUTPUT
      
      - name: Prepare Release Notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          NOTES="## FocusFlow v$VERSION
          
          ### What's New
          - Performance improvements
          - Bug fixes
          
          ### Download
          - Install the APK below
          - **Website:** https://chartmann1590.github.io/FocusFlow/
          
          ### Installation
          1. Download the APK
          2. Enable 'Install from unknown sources' on your device
          3. Open and install
          
          Built with ❤️"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "FocusFlow v${{ env.VERSION_NAME }}"
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./*.apk
          asset_name: FocusFlow-${{ steps.release_notes.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Generate Checksum File
        run: |
          echo "# FocusFlow v${{ steps.release_notes.outputs.version }}" > checksums.txt
          echo "" >> checksums.txt
          echo "SHA256 Checksums:" >> checksums.txt
          echo "" >> checksums.txt
          for f in *.apk; do
            echo "$f: $(sha256sum $f | cut -d' ' -f1)" >> checksums.txt
          done
      
      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain

  release-info:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Release Ready! 🚀\n\nAPK has been built and uploaded.\n\n**Website:** https://chartmann1590.github.io/FocusFlow/\n**Download:** https://github.com/chartmann1590/FocusFlow/releases/latest'
            })
